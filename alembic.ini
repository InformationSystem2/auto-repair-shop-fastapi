[alembic]
script_location = alembic
prepend_sys_path = .
# Fallback: sqlalchemy.url is primarily read from DATABASE_URL environment variable in env.py
# For local development without env var, set this to localhost:5432
sqlalchemy.url = postgresql://first_exam:first_exam@localhost:5432/auto_repair_shop
[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
